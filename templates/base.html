<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiSync AI - Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #12141C; color: #F3F4F6; }
    </style>
</head>
<body class="font-sans antialiased">
    <div class="flex h-screen overflow-hidden">
        
        <aside class="w-64 bg-[#1E2230] border-r border-gray-800 flex flex-col justify-between">
            <div class="p-6">
                <div class="flex items-center space-x-3 mb-8">
                    <span class="text-2xl text-[#00D2FF]"></span>
                    <span class="text-xl font-bold text-[#00D2FF] tracking-wider">LOGISYNC AI</span>
                </div>
                <nav class="space-y-2">
                    <a href="{{ url_for('dashboard_view') }}" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition">
                        <span></span> <span>Overview Dashboard</span>
                    </a>
                    <a href="{{ url_for('map_view') }}" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition">
                        <span></span> <span>Live Fleet Map</span>
                    </a>
                    <a href="{{ url_for('drivers_view') }}" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition">
                        <span></span> <span>Driver Monitor</span>
                    </a>
                    <a href="{{ url_for('alerts_view') }}" class="flex items-center space-x-3 px-4 py-3 text-gray-400 hover:bg-gray-800 hover:text-white rounded-xl transition">
                        <span></span> <span>Alert Center</span>
                    </a>
                </nav>
            </div>
            
            <div class="p-4 border-t border-gray-800 space-y-3">
                <a href="{{ url_for('profile_view') }}" class="flex items-center space-x-3 p-2 hover:bg-gray-800/50 rounded-xl transition block">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-teal-400 flex items-center justify-center text-lg font-bold text-white">
                        {{ session.get('user_name', 'Ady')[0:2] }}
                    </div>
                    <div>
                        <p class="text-sm font-semibold text-gray-200">{{ session.get('user_name', 'Ady Tri') }}</p>
                        <p class="text-xs text-gray-400">View Profile</p>
                    </div>
                </a>
                
                <a href="{{ url_for('login_view') }}" class="flex items-center justify-center space-x-2 w-full py-2 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white rounded-xl font-medium text-sm border border-red-500/20 transition duration-200">
                    <span></span> <span>Log Out Center</span>
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-y-auto">
            <header class="bg-[#1E2230]/50 backdrop-blur-md border-b border-gray-800 px-8 py-4 flex justify-between items-center sticky top-0 z-50">
                <h1 class="text-lg font-semibold tracking-wide text-gray-200">SMART LOGISTICS CONTROL CENTER</h1>
                <div class="flex items-center space-x-4">
                    <div class="relative">
    <button id="notifBtn" class="text-xl p-2 text-gray-400 hover:text-white transition">
        🔔<span id="notifBadge" class="hidden absolute top-0 right-0 w-3 h-3 bg-red-500 rounded-full"></span>
    </button>
    <div id="notifPanel" class="hidden absolute right-0 mt-2 w-80 bg-[#1E2230] border border-gray-700 rounded-xl shadow-2xl p-4 z-50">
        <h3 class="text-sm font-bold mb-3 border-b border-gray-700 pb-2">ALERT PENTING</h3>
        <div id="notifList" class="space-y-3">
            </div>
    </div>
</div>

<script>
// Fungsi toggle dropdown
document.getElementById('notifBtn').onclick = () => {
    document.getElementById('notifPanel').classList.toggle('hidden');
};

// Polling notifikasi setiap 3 detik
setInterval(() => {
    fetch('/api/notifications')
    .then(res => res.json())
    .then(data => {
        const list = document.getElementById('notifList');
        if(data.length > 0) {
            document.getElementById('notifBadge').classList.remove('hidden');
            list.innerHTML = data.map(n => `
                <div class="p-3 bg-red-500/10 border border-red-500/20 rounded-lg">
                    <p class="text-xs font-bold text-red-400">${n.driver_name} - MENGANTUK!</p>
                    <p class="text-[10px] text-gray-400">Lokasi: ${n.location}</p>
                    <button onclick="cariRestArea('${n.location}')" class="mt-2 w-full text-[10px] bg-blue-600 py-1 rounded">CARI REST AREA</button>
                </div>
            `).join('');
        }
    });
}, 30000);

function cariRestArea(lokasi) {
    // Arahkan ke halaman map dengan koordinat lokasi driver
    window.location.href = `/map?center=${lokasi}`;
}
</script>
                    <span class="text-sm bg-gray-800 px-3 py-1.5 rounded-lg border border-gray-700 text-gray-300">Region: Central Java</span>
                </div>
            </header>

            <main class="p-8">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
</body>
</html>
