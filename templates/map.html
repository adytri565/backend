{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<div class="space-y-6">
    <div class="flex justify-between items-center bg-[#1E2230] p-4 rounded-xl border border-gray-800 shadow-md">
        <div>
            <h2 class="text-lg font-semibold text-gray-200 flex items-center gap-2">
                <span></span> Real-time Fleet Tracking
            </h2>
            <p class="text-xs text-gray-400">Memantau lokasi, kecepatan, dan status keselamatan armada logistik lewat koordinat GPS HP Driver.</p>
        </div>
        <div class="flex items-center gap-3">
            <span class="flex h-3 w-3 relative">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span class="text-xs font-mono text-gray-300">Live GPS Syncing</span>
        </div>
    </div>

    <div class="bg-[#1E2230] p-4 rounded-2xl border border-gray-800 shadow-xl">
        <div id="fleetMap" class="w-full h-[650px] rounded-xl overflow-hidden border border-gray-700"></div>
    </div>
</div>

<script>
    // 1. Inisialisasi Peta (Default Center di area Semarang / Jawa Tengah HUB)
    const map = L.map('fleetMap').setView([-6.9932, 110.4203], 8);

    // Style tiles peta mode gelap (CartoDB DarkMatter)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // Layer Group untuk menampung marker truk agar bisa di-refresh berkala
    let markerGroup = L.layerGroup().addTo(map);

    // 2. Fungsi Mengambil Data Koordinat GPS dari Backend API
    function updateFleetPositions() {
        fetch('/api/location/fleet')
            .then(response => response.json())
            .then(res => {
                if(res.status === 'success') {
                    // Bersihkan marker lama sebelum menggambar marker baru
                    markerGroup.clearLayers();

                    res.locations.forEach(truck => {
                        // Tentukan warna marker/lingkaran berdasarkan status kantuk AI lapangan
                        let markerColor = "#00E676"; // Focused (Hijau)
                        let displayStatus = truck.status;

                        if (truck.status === "Drowsy" || truck.status === "Drowsiness Detected") {
                            markerColor = "#FF3D00"; // Critical Drowsy (Merah)
                            displayStatus = "DROWSY";
                        } else if (truck.status === "Tired") {
                            markerColor = "#FFEA00"; // Warning Tired (Kuning)
                            displayStatus = "TIRED";
                        } else {
                            displayStatus = "FOCUSED";
                        }

                        // Gambar kustom marker lingkaran bercahaya
                        const customMarker = L.circleMarker([truck.lat, truck.lng], {
                            radius: 11,
                            fillColor: markerColor,
                            color: '#ffffff',
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        });

                        // Desain isi Balon Informasi (Popup) saat marker diklik (DITAMBAH KECEPATAN GPS)
                        const popupContent = `
                            <div class="text-gray-900 font-sans p-1 min-w-[180px]">
                                <h4 class="font-bold border-b pb-1 text-blue-600 flex justify-between items-center">
                                    <span>🚚 ${truck.truck_id}</span>
                                </h4>
                                <p class="text-xs mt-2 text-gray-600"><b>Pengemudi:</b> <span class="text-gray-900 text-sm block font-semibold">${truck.driver}</span></p>
                                <p class="text-xs text-gray-600 mt-1"><b>Kecepatan GPS:</b> <span class="text-sm font-mono font-bold text-blue-600 block">${truck.speed ? truck.speed : 0} Km/h</span></p>
                                <p class="text-xs text-gray-600 mt-1"><b>Status AI Safety:</b> 
                                    <span class="block text-xs font-black mt-0.5" style="color: ${markerColor};">
                                        ${displayStatus}
                                    </span>
                                </p>
                                <div class="mt-3 pt-2 border-t border-gray-100 flex gap-1">
                                    <button onclick="alert('Instruksi menepi dan beristirahat telah dikirim ke HP ${truck.driver}')" style="background:#1e2230; color:#fff; border:none; padding:6px 10px; border-radius:6px; font-size:10px; font-weight:bold; width:100%; cursor:pointer;">🚨 Kirim Peringatan</button>
                                </div>
                            </div>
                        `;

                        customMarker.bindPopup(popupContent);
                        markerGroup.addLayer(customMarker);
                    });
                }
            })
            .catch(err => console.error("Gagal sinkronisasi peta GPS:", err));
    }

    // Jalankan fungsi saat halaman pertama kali dibuka
    updateFleetPositions();

    // Lakukan interval pembaruan posisi otomatis setiap 5 detik (Real-time tracking)
    setInterval(updateFleetPositions, 5000);
</script>

<style>
    .leaflet-popup-content-wrapper {
        background: #ffffff !important;
        border-radius: 12px !important;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
    }
    .leaflet-popup-tip {
        background: #ffffff !important;
    }
</style>
{% endblock %}
